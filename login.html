<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chunks AI — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://wiwbfspsrgayvquzfryl.supabase.co">
  <link rel="dns-prefetch" href="https://accounts.google.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Supabase SDK loaded async — only needed for session check & OAuth callback exchange -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" async id="sb-sdk"></script>
  <style>
    :root {
      --bg:#080810;--surface-1:#111219;--surface-2:#171820;--surface-3:#1e1f29;
      --border-xs:rgba(255,255,255,0.05);--border-sm:rgba(255,255,255,0.08);
      --border-md:rgba(255,255,255,0.13);--border-lg:rgba(255,255,255,0.20);
      --gold:#e8ac2e;--gold-muted:rgba(232,172,46,0.10);--gold-border:rgba(232,172,46,0.22);
      --violet:#8b7cf8;--text-1:#ededf0;--text-2:#9898ae;--text-3:#55556a;--text-4:#3a3a4d;
      --red:#f87171;--font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
      --font-mono:'DM Mono',monospace;--r-sm:8px;--r-md:12px;--r-pill:9999px;
      --t-fast:120ms;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--bg);color:var(--text-1);font-family:var(--font-body);-webkit-font-smoothing:antialiased;overflow:hidden;}
    .bg-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .bg-orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:0.18;}
    .bg-orb-1{width:600px;height:600px;background:radial-gradient(circle,#e8ac2e,transparent 70%);top:-200px;left:-100px;animation:od1 18s ease-in-out infinite;}
    .bg-orb-2{width:500px;height:500px;background:radial-gradient(circle,#8b7cf8,transparent 70%);bottom:-150px;right:-100px;animation:od2 22s ease-in-out infinite;}
    .bg-orb-3{width:300px;height:300px;background:radial-gradient(circle,#2dd4bf,transparent 70%);top:50%;left:60%;opacity:0.09;animation:od3 28s ease-in-out infinite;}
    @keyframes od1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,60px)}}
    @keyframes od2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-40px)}}
    @keyframes od3{0%,100%{transform:translate(0,0)}33%{transform:translate(-30px,20px)}66%{transform:translate(20px,-30px)}}
    .bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:48px 48px;}
    .page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{width:100%;max-width:400px;background:var(--surface-1);border:1px solid var(--border-md);border-radius:24px;padding:40px 36px 36px;box-shadow:0 0 0 1px rgba(255,255,255,0.03) inset,0 32px 80px rgba(0,0,0,0.6);animation:card-in 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}
    @keyframes card-in{from{opacity:0;transform:translateY(24px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
    .logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
    .logo-mark{width:34px;height:34px;flex-shrink:0;}
    .logo-name{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text-1);letter-spacing:-0.01em;}
    .logo-name span{color:var(--gold);}
    .card-title{font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--text-1);line-height:1.2;margin-bottom:8px;}
    .card-sub{font-size:13px;color:var(--text-3);line-height:1.55;margin-bottom:28px;}
    .btn-google{
      width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
      padding:13px 20px;border-radius:var(--r-md);border:1px solid var(--border-md);
      background:var(--surface-2);color:var(--text-1);font-family:var(--font-body);
      font-size:14px;font-weight:500;cursor:pointer;text-decoration:none;
      transition:background var(--t-fast),border-color var(--t-fast),transform var(--t-fast);
      position:relative;overflow:hidden;
    }
    .btn-google::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 60%);pointer-events:none;}
    .btn-google:hover{background:var(--surface-3);border-color:var(--border-lg);transform:translateY(-1px);}
    .btn-google:active{transform:translateY(0);}
    .btn-google-icon{width:18px;height:18px;flex-shrink:0;}
    .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
    .divider-line{flex:1;height:1px;background:var(--border-xs);}
    .divider-text{font-size:11px;color:var(--text-4);font-family:var(--font-mono);letter-spacing:0.05em;}
    .btn-guest{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:var(--r-md);border:1px solid var(--border-xs);background:transparent;color:var(--text-3);font-family:var(--font-body);font-size:13px;cursor:pointer;transition:color var(--t-fast),border-color var(--t-fast),background var(--t-fast);outline:none;}
    .btn-guest:hover{color:var(--text-2);border-color:var(--border-sm);background:var(--surface-2);}
    .features{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:28px;}
    .feat-pill{font-size:11px;color:var(--text-3);background:var(--surface-2);border:1px solid var(--border-xs);border-radius:var(--r-pill);padding:4px 10px;font-family:var(--font-mono);}
    .card-footer{margin-top:24px;text-align:center;font-size:11px;color:var(--text-4);line-height:1.6;}
    .card-footer a{color:var(--text-3);text-decoration:none;}
    .card-footer a:hover{color:var(--text-2);text-decoration:underline;}
    .auth-error{display:none;background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:var(--r-sm);padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:16px;}
    .auth-error.show{display:block;}
    /* Callback loading state */
    .callback-overlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
    .callback-overlay.show{display:flex;}
    .cb-spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,0.1);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;}
    .cb-text{font-size:13px;color:var(--text-3);}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="callback-overlay" id="callback-overlay">
  <div class="cb-spinner"></div>
  <div class="cb-text">Signing you in…</div>
</div>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="page">
  <div class="card">
    <div class="logo-wrap">
      <svg class="logo-mark" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg-gv" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#e8ac2e"/><stop offset="100%" stop-color="#8b7cf8"/></linearGradient>
          <linearGradient id="lg-vg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#8b7cf8"/><stop offset="100%" stop-color="#e8ac2e"/></linearGradient>
        </defs>
        <ellipse cx="18" cy="18" rx="14" ry="5" fill="none" stroke="url(#lg-gv)" stroke-width="2.2" opacity="0.95"/>
        <ellipse cx="18" cy="18" rx="14" ry="5" fill="none" stroke="url(#lg-vg)" stroke-width="2.2" transform="rotate(60 18 18)" opacity="0.88"/>
        <ellipse cx="18" cy="18" rx="14" ry="5" fill="none" stroke="url(#lg-gv)" stroke-width="2.2" transform="rotate(120 18 18)" opacity="0.80"/>
        <circle cx="18" cy="18" r="3" fill="#e8ac2e"/>
      </svg>
      <span class="logo-name">Chunks <span>AI</span></span>
    </div>

    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to access your textbooks, flashcards, and study history.</p>

    <div class="features">
      <span class="feat-pill">Workspace</span>
      <span class="feat-pill">Flashcards</span>
      <span class="feat-pill">Exam mode</span>
      <span class="feat-pill">AI tutor</span>
      <span class="feat-pill">Research</span>
    </div>

    <div class="auth-error" id="auth-error"></div>

    <!--
      Direct link to Supabase OAuth endpoint — no JavaScript, no SDK, no waiting.
      Clicking this immediately navigates to Google's account chooser.
    -->
    <a class="btn-google" id="btn-google" href="https://wiwbfspsrgayvquzfryl.supabase.co/auth/v1/authorize?provider=google&redirect_to=https://chunks-ai-main.vercel.app/login.html">
      <svg class="btn-google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Continue with Google</span>
    </a>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-guest" onclick="continueAsGuest()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Continue as guest
    </button>

    <div class="card-footer">
      By signing in you agree to our
      <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>
    </div>
  </div>
</div>

<script>
  // ── Guest ─────────────────────────────────────────────────────────────────
  function continueAsGuest() {
    sessionStorage.setItem('chunks_guest_mode', '1');
    window.location.href = 'index.html';
  }

  // ── Error display ─────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('callback-overlay').classList.remove('show');
  }

  // ── OAuth callback handler (runs when Supabase redirects back here) ───────
  // Only activates when URL has ?code= — otherwise does nothing.
  const hasCode = window.location.search.includes('code=');
  const hasHash = window.location.hash.includes('access_token');
  const isPostLogout = sessionStorage.getItem('chunks_signing_out') === '1';

  if (isPostLogout) {
    // Came from logout — clear flag, stay on login page
    sessionStorage.removeItem('chunks_signing_out');
    // SDK will clear session when it loads
  } else if (hasCode || hasHash) {
    // Show loading overlay immediately — looks fast to the user
    document.getElementById('callback-overlay').classList.add('show');
  }

  // ── Load Supabase SDK (async — only needed for callback & session check) ──
  const SUPABASE_URL  = 'https://wiwbfspsrgayvquzfryl.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jmc3BzcmdheXZxdXpmcnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjgyNzUsImV4cCI6MjA4NzUwNDI3NX0.8ct39elZ_Xgivs5zgL2T98GyIG9W8N05XAZWkFRn07I';

  const _mem = {};
  const _store = (() => {
    try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); return localStorage; } catch(_) {}
    try { sessionStorage.setItem('__t','1'); sessionStorage.removeItem('__t'); return sessionStorage; } catch(_) {}
    return { getItem:k=>_mem[k]??null, setItem:(k,v)=>{_mem[k]=String(v);}, removeItem:k=>{delete _mem[k];} };
  })();

  function _initSupabase() {
    if (!window.supabase) return null;
    return window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession:true, autoRefreshToken:true, storage:_store, storageKey:'chunks-ai-auth' }
    });
  }

  // Wait for SDK then handle session/callback
  document.getElementById('sb-sdk').addEventListener('load', async () => {
    const sb = _initSupabase();
    if (!sb) return;

    // Post-logout: clear lingering session
    if (isPostLogout) {
      try { await sb.auth.signOut({ scope: 'local' }); } catch(_) {}
      return;
    }

    // OAuth callback — exchange code for session
    if (hasCode || hasHash) {
      try {
        const { data: { session }, error } = await sb.auth.getSession();
        if (error) throw error;
        if (session) { window.location.replace('index.html'); return; }
        // Listen for SIGNED_IN if session not ready yet
        sb.auth.onAuthStateChange((event, session) => {
          if (event === 'SIGNED_IN' && session) window.location.replace('index.html');
          if (event === 'SIGNED_IN' && !session) showError('Sign-in failed. Please try again.');
        });
      } catch(err) {
        showError(err.message || 'Sign-in failed. Please try again.');
      }
      return;
    }

    // Normal load — skip login if already authenticated
    const { data: { session } } = await sb.auth.getSession();
    if (session) window.location.replace('index.html');
  });
</script>
</body>
</html>
