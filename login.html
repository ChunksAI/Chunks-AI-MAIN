<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chunks AI — Sign in</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:          #080810;
      --surface-0:   #0d0e14;
      --surface-1:   #111219;
      --surface-2:   #171820;
      --surface-3:   #1e1f29;
      --surface-4:   #252633;
      --border-xs:   rgba(255,255,255,0.05);
      --border-sm:   rgba(255,255,255,0.08);
      --border-md:   rgba(255,255,255,0.13);
      --border-lg:   rgba(255,255,255,0.20);
      --gold:        #e8ac2e;
      --gold-bright: #f5c842;
      --gold-muted:  rgba(232,172,46,0.10);
      --gold-glow:   rgba(232,172,46,0.18);
      --gold-border: rgba(232,172,46,0.22);
      --violet:      #8b7cf8;
      --violet-muted:rgba(139,124,248,0.10);
      --violet-border:rgba(139,124,248,0.22);
      --text-1:      #ededf0;
      --text-2:      #9898ae;
      --text-3:      #55556a;
      --text-4:      #3a3a4d;
      --red:         #f87171;
      --font-head:   'Syne', sans-serif;
      --font-body:   'DM Sans', sans-serif;
      --font-mono:   'DM Mono', monospace;
      --r-sm:   8px;
      --r-md:   12px;
      --r-lg:   16px;
      --r-xl:   20px;
      --r-pill: 9999px;
      --t-fast: 120ms;
      --t-mid:  220ms;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text-1);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Background layers ── */
    .bg-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
    }
    .bg-orb-1 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, #e8ac2e, transparent 70%);
      top: -200px; left: -100px;
      animation: orb-drift-1 18s ease-in-out infinite;
    }
    .bg-orb-2 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #8b7cf8, transparent 70%);
      bottom: -150px; right: -100px;
      animation: orb-drift-2 22s ease-in-out infinite;
    }
    .bg-orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #2dd4bf, transparent 70%);
      top: 50%; left: 60%;
      opacity: 0.09;
      animation: orb-drift-3 28s ease-in-out infinite;
    }

    @keyframes orb-drift-1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(40px, 60px); }
    }
    @keyframes orb-drift-2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-50px, -40px); }
    }
    @keyframes orb-drift-3 {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(-30px, 20px); }
      66% { transform: translate(20px, -30px); }
    }

    /* Fine grid overlay */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ── Layout ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 400px;
      background: var(--surface-1);
      border: 1px solid var(--border-md);
      border-radius: 24px;
      padding: 40px 36px 36px;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.03) inset,
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(232,172,46,0.04);
      animation: card-in 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo ── */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-mark {
      width: 34px; height: 34px;
      flex-shrink: 0;
    }

    .logo-name {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.01em;
    }
    .logo-name span { color: var(--gold); }

    /* ── Heading ── */
    .card-title {
      font-family: var(--font-head);
      font-size: 24px;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .card-sub {
      font-size: 13px;
      color: var(--text-3);
      line-height: 1.55;
      margin-bottom: 28px;
    }

    /* ── Google button ── */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      border-radius: var(--r-md);
      border: 1px solid var(--border-md);
      background: var(--surface-2);
      color: var(--text-1);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--t-fast), border-color var(--t-fast), transform var(--t-fast);
      outline: none;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }
    .btn-google::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }
    .btn-google:hover {
      background: var(--surface-3);
      border-color: var(--border-lg);
      transform: translateY(-1px);
    }
    .btn-google:active { transform: translateY(0); }
    .btn-google:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-google-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border-xs);
    }
    .divider-text {
      font-size: 11px;
      color: var(--text-4);
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }

    /* ── Continue as guest ── */
    .btn-guest {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 20px;
      border-radius: var(--r-md);
      border: 1px solid var(--border-xs);
      background: transparent;
      color: var(--text-3);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: color var(--t-fast), border-color var(--t-fast), background var(--t-fast);
      outline: none;
    }
    .btn-guest:hover {
      color: var(--text-2);
      border-color: var(--border-sm);
      background: var(--surface-2);
    }

    /* ── Feature pills ── */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 28px;
    }
    .feat-pill {
      font-size: 11px;
      color: var(--text-3);
      background: var(--surface-2);
      border: 1px solid var(--border-xs);
      border-radius: var(--r-pill);
      padding: 4px 10px;
      font-family: var(--font-mono);
    }

    /* ── Footer ── */
    .card-footer {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--text-4);
      line-height: 1.6;
    }
    .card-footer a {
      color: var(--text-3);
      text-decoration: none;
    }
    .card-footer a:hover { color: var(--text-2); text-decoration: underline; }

    /* ── Error ── */
    .auth-error {
      display: none;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: var(--r-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--red);
      margin-bottom: 16px;
    }
    .auth-error.show { display: block; }

    /* ── Loading spinner ── */
    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--text-1);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-google.loading .spinner { display: block; }
    .btn-google.loading .btn-google-icon,
    .btn-google.loading .btn-label { opacity: 0.4; }
  </style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<div class="page">
  <div class="card">

    <!-- Logo -->
    <div class="logo-wrap">
      <svg class="logo-mark" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg-gv" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#e8ac2e"/>
            <stop offset="100%" stop-color="#8b7cf8"/>
          </linearGradient>
          <linearGradient id="lg-vg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8b7cf8"/>
            <stop offset="100%" stop-color="#e8ac2e"/>
          </linearGradient>
        </defs>
        <ellipse cx="18" cy="18" rx="14" ry="5" fill="none" stroke="url(#lg-gv)" stroke-width="2.2" opacity="0.95"/>
        <ellipse cx="18" cy="18" rx="14" ry="5" fill="none" stroke="url(#lg-vg)" stroke-width="2.2" transform="rotate(60 18 18)" opacity="0.88"/>
        <ellipse cx="18" cy="18" rx="14" ry="5" fill="none" stroke="url(#lg-gv)" stroke-width="2.2" transform="rotate(120 18 18)" opacity="0.80"/>
        <circle cx="18" cy="18" r="3" fill="#e8ac2e"/>
      </svg>
      <span class="logo-name">Chunks <span>AI</span></span>
    </div>

    <!-- Heading -->
    <h1 class="card-title">Welcome back</h1>
    <p class="card-sub">Sign in to access your textbooks, flashcards, and study history.</p>

    <!-- Feature pills -->
    <div class="features">
      <span class="feat-pill">Workspace</span>
      <span class="feat-pill">Flashcards</span>
      <span class="feat-pill">Exam mode</span>
      <span class="feat-pill">AI tutor</span>
      <span class="feat-pill">Research</span>
    </div>

    <!-- Error -->
    <div class="auth-error" id="auth-error"></div>

    <!-- Google sign-in -->
    <button class="btn-google" id="btn-google" onclick="signInWithGoogle()">
      <svg class="btn-google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span class="btn-label">Continue with Google</span>
      <div class="spinner"></div>
    </button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <!-- Guest -->
    <button class="btn-guest" onclick="continueAsGuest()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Continue as guest
    </button>

    <div class="card-footer">
      By signing in you agree to our
      <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>
    </div>

  </div>
</div>

<script>
  // ── Supabase config (anon key is safe to expose in frontend) ──
  const SUPABASE_URL  = 'https://wiwbfspsrgayvquzfryl.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jmc3BzcmdheXZxdXpmcnlsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE5MjgyNzUsImV4cCI6MjA4NzUwNDI3NX0.8ct39elZ_Xgivs5zgL2T98GyIG9W8N05XAZWkFRn07I';

  // ── Safe storage fallback ─────────────────────────────────────────────────
  // Edge / Safari Tracking Prevention blocks localStorage from CDN scripts.
  // We try localStorage → sessionStorage → in-memory so the session always
  // has somewhere to persist. Must match storageKey in supabase.js!
  const _memStore = {};
  const _safeStorage = (() => {
    try {
      localStorage.setItem('__t', '1');
      localStorage.removeItem('__t');
      return localStorage;                              // ✅ localStorage works
    } catch (_) {}
    try {
      sessionStorage.setItem('__t', '1');
      sessionStorage.removeItem('__t');
      return sessionStorage;                            // ✅ sessionStorage works
    } catch (_) {}
    return {                                            // ✅ in-memory fallback
      getItem:    k     => _memStore[k] ?? null,
      setItem:    (k,v) => { _memStore[k] = String(v); },
      removeItem: k     => { delete _memStore[k]; },
    };
  })();

  const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: {
      persistSession:   true,
      autoRefreshToken: true,
      storage:          _safeStorage,
      storageKey:       'chunks-ai-auth',   // ← must match supabase.js
    }
  });

  // ── Redirect target after login ──
  function _getReturnUrl() {
    const params = new URLSearchParams(window.location.search);
    const returnTo = params.get('returnTo');
    if (returnTo) { try { return decodeURIComponent(returnTo); } catch (_) {} }
    return 'index.html';
  }

  function _getRedirectUrl() {
    const loc = window.location;
    return loc.origin + loc.pathname; // stays on login.html
  }

  // ── Google Sign In ────────────────────────────────────────────────────────
  async function signInWithGoogle() {
    const btn = document.getElementById('btn-google');
    btn.classList.add('loading');
    btn.disabled = true;
    hideError();

    const { error } = await _supabase.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: _getRedirectUrl() }
    });

    if (error) {
      showError(error.message || 'Sign-in failed. Please try again.');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
    // On success the browser navigates away — loading stays
  }

  // ── Guest ─────────────────────────────────────────────────────────────────
  function continueAsGuest() {
    sessionStorage.setItem('chunks_guest_mode', '1');
    window.location.href = _getReturnUrl();
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function showError(msg) {
    const el = document.getElementById('auth-error');
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError() {
    document.getElementById('auth-error').classList.remove('show');
  }

  // ── On load: handle OAuth callback OR skip if already authenticated ───────
  (async () => {
    // If we just came from a logout, DO NOT auto-redirect back to the app.
    // chunksSignOut sets chunks_signing_out=1 before navigating here.
    const isPostLogout = sessionStorage.getItem('chunks_signing_out') === '1';
    if (isPostLogout) {
      // Clear the flag and force Supabase to sign out fully on this page too
      sessionStorage.removeItem('chunks_signing_out');
      // Clear any lingering Supabase session from storage
      try { await _supabase.auth.signOut({ scope: 'local' }); } catch (_) {}
      // Stay on login page — do not redirect
      return;
    }

    // If Supabase just redirected back with a code, exchange it first
    const hasCode = window.location.search.includes('code=');
    const hasHash = window.location.hash.includes('access_token');

    if (hasCode || hasHash) {
      // Let Supabase process the callback — then redirect to returnTo
      const { data: { session }, error } = await _supabase.auth.getSession();
      if (session) {
        window.location.replace(_getReturnUrl());
        return;
      }
      // If no session yet, listen for SIGNED_IN event
      _supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) {
          window.location.replace(_getReturnUrl());
        }
      });
      return;
    }

    // Normal load — skip login if already authenticated
    const { data: { session } } = await _supabase.auth.getSession();
    if (session) {
      window.location.replace(_getReturnUrl());
    }
  })();
</script>
</body>
</html>
